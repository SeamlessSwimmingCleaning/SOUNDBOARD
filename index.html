<!DOCTYPE html>
<html lang="en">
  
  <style>
    .container {
      position: absolute;
      top: 50%;
      left: 50%;
      margin-top: -50px;
      margin-left: -50px;
      width: 100px;
      height: 100px;
    }
    .center {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    button {
      min-width: 80px;
      height: 40px;
      margin-left: 10px;
      border-radius: 4px;
      border: 1px solid plum;
      cursor: pointer;
      color: purple;
      font-weight: 600;
    }
    button:hover {
      color: blue;
    }
    .text {
      padding: 25%;
    }
    #StopAudios {
      color: red;
    }
    #StopAudios:hover {
      color: darkred; /* Corrected from 'colore' to 'color' */
    }
  </style>
 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soundboard</title>
</head>
  
<body>
  <h1 class="text">SOUNDBOARD</h1>
  <div class="container">
    <div class="center">
      <button id="WetFart" onClick="play_sound(this.id)">Wet Fart</button>
      <button id="Toot" onClick="play_sound(this.id)">Toot</button>
      <button id="Aura" onClick="play_sound(this.id)">Aura</button>
      <button id="faaah" onClick="play_sound(this.id)">FAAAH</button>
      <button id="Siren" onClick="play_sound(this.id)">Siren</button>
      <button id="WindowsXp" onClick="play_sound(this.id)">Windows Xp 21</button>
      <button id="StopAudios" onClick="stopAudio()">STOP AUDIOS</button>
    </div>
  </div>
  
</body>
<script>  
  var audio; // Declare audio in a broader scope

  function play_sound(clicked_id) {
    if (audio) { // Stop any currently playing audio
      audio.pause();
      audio.currentTime = 0;
    }
    audio = new Audio(clicked_id + ".mp3");
    audio.play();
  }

  function stopAudio() {
    if (audio) { // Check if audio is defined
      audio.pause();
      audio.currentTime = 0;
    }
  }
</script>
</html>
